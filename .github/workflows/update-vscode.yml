name: update-vscode

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        id: update
        run: |
          before=$(jq -r '.stable.commit' versions.json)
          ./scripts/update-vscode-sha256.sh
          after=$(jq -r '.stable.commit' versions.json)
          if [[ "$before" == "$after" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream change (still ${before:0:7})."
          else
            version=$(jq -r '.stable.version' versions.json)
            short=${after:0:7}
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "commit=$after"   >> "$GITHUB_OUTPUT"
            echo "short=$short"    >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: chore/update-vscode-${{ steps.update.outputs.short }}
          commit-message: "chore: bump VS Code to ${{ steps.update.outputs.version }} (${{ steps.update.outputs.short }})"
          title: "chore: bump VS Code to ${{ steps.update.outputs.version }}"
          body: |
            VS Code CLI auto-update from scheduled workflow.

            - version: `${{ steps.update.outputs.version }}`
            - commit: `${{ steps.update.outputs.commit }}`

            sha256 fetched by downloading the tarball at `commit:${{ steps.update.outputs.commit }}` and computing locally — matches the pinned commit, not a moving "latest" pointer.
          labels: |
            dependencies
            vscode-update
